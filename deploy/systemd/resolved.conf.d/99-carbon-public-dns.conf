# Used by scripts/fix-docker-dns.sh — fixes host DNS so dockerd can resolve public.ecr.aws
# (docker pull does NOT use daemon.json "dns"; it uses the host resolver / systemd-resolved).
#
# Install: sudo cp deploy/systemd/resolved.conf.d/99-carbon-public-dns.conf /etc/systemd/resolved.conf.d/
#          sudo systemctl restart systemd-resolved
[Resolve]
DNS=1.1.1.1 8.8.8.8
FallbackDNS=9.9.9.9
