# Self-hosted ERP + Postgres (persistent volume).
# Carbon still requires SUPABASE_URL + JWT keys from a Supabase-compatible API — see README.md.
#
# Postgres credentials come only from env_file (same directory as this file). That way
# `docker compose -f deploy/selfhosted/docker-compose.yml` works from the repo root and does
# not use the root .env for ${...} interpolation (which caused missing POSTGRES_PASSWORD).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - carbon_postgres_data:/var/lib/postgresql/data
    # start_period: first init of an empty volume can take 30s+; failures before this do not mark unhealthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s

  erp:
    build:
      context: ../..
      dockerfile: apps/erp/Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    # If Supabase runs on the host (e.g. `supabase start`), use SUPABASE_URL=http://host.docker.internal:54321
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  carbon_postgres_data:
